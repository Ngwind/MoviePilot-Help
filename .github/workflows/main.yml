name: Sync Upstream

on:
  schedule:
    - cron: "0 * * * *"  # 每小时同步一次
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/Putarku/MoviePilot-Help.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories --no-edit
          git push origin main
        shell: bash
